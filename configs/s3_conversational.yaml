# Nấc S3 — hội thoại/tự nhiên (mục tiêu callbot FCI). Continue từ s2-fc115m-full.nemo.
# Domain CHÍNH = hội thoại (vietsuperspeech + viVoice + bud500).
# Audiobook (phoaudiobook/infore2) chỉ LIỀU NHỎ (cap) để đo generalize, KHÔNG cho áp đảo.
# Replay S1/S2 chống quên. Giữ tokenizer S2 (change_vocabulary=false).
# `cap` = subsample tối đa N clip (lấy đều tay); `weight` = upsample (nhân bản).

run:
  id: s3-fc115m-full
  stage: s3

model:
  init_from: /srv/team-share/models/asr_vi/s2-fc115m-full.nemo
  change_vocabulary: false

data:
  # Suite test MỞ RỘNG: 6 test cũ + 3 test S3 (vietsuperspeech = gần callbot nhất).
  # File thiếu (bud500 chưa build) sẽ được stages bỏ qua an toàn.
  eval_fixed:
    vivos_test: vivos.test.jsonl
    cv_test: common_voice_vi.test.jsonl
    fleurs_test: fleurs_vi.test.jsonl
    vlsp_test: vlsp2020_100h.test.jsonl
    lsvsc_test: lsvsc.test.jsonl
    fosd_test: fosd.test.jsonl
    vietsuperspeech_test: vietsuperspeech.test.jsonl   # HỘI THOẠI — câu hỏi callbot FCI
    bud500_test: bud500.test.jsonl                     # 3 vùng miền (sau khi build)
    vietmed_test: vietmed.test.jsonl                   # y tế (test official)
  train_sets:
    # --- Domain CHÍNH: hội thoại / tự nhiên ---
    - {name: vietsuperspeech, weight: 2}               # 60k clip podcast/phỏng vấn — gần callbot nhất, boost
    - {name: vivoice, weight: 1, cap: 150000}          # YouTube spontaneous, cap ~170h
    - {name: bud500, weight: 1, cap: 120000}           # 3 vùng miền (dùng khi build xong)
    # --- Audiobook LIỀU NHỎ (đo generalize, không áp đảo) ---
    - {name: phoaudiobook, weight: 1, cap: 40000}      # ~55h
    - {name: infore2_audiobooks, weight: 1, cap: 30000}  # ~40h
    # --- Replay S1/S2 chống quên ---
    - {name: vivos, weight: 2}
    - {name: common_voice_vi, weight: 2}
    - {name: fleurs_vi, weight: 2}
    - {name: fosd, weight: 1}
    - {name: vlsp2020_100h, weight: 1}
    - {name: lsvsc, weight: 1}
    - {name: infore1, weight: 1}

train:
  epochs: 4                     # data ~630k dòng, lớn hơn S2 -> ít epoch
  max_minutes: 1000

checkpoint:
  every_n_train_steps: 500      # ~2470 step/epoch -> ~5 ckpt/epoch
